<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plate + Connect — Hollow</title>
<meta name="description" content="Plate + Connect — a connected system by Hollow Pty Ltd.">
<link rel="icon" href="assets/logo_icon_black.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  body{
    --bg:#131210;--fg:#ecebe6;--muted:#8f8c84;--faint:#cdccc5;
    --line:rgba(255,255,255,.11);--hair:rgba(255,255,255,.22);--frame:rgba(255,255,255,.20);--invert:1;
    background:#131210;font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  }
  body.theme-light{
    --bg:#f4f3ef;--fg:#171614;--muted:#8a8780;--faint:#3a3833;
    --line:rgba(0,0,0,.11);--hair:rgba(0,0,0,.24);--frame:rgba(0,0,0,.28);--invert:0;
    background:#f4f3ef;
  }
  a{color:var(--fg);text-decoration:none;transition:opacity .15s}
  a:hover{opacity:.55}
  .tbtn{font:500 11px 'Spline Sans Mono',monospace;letter-spacing:.14em;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:20px;padding:7px 15px;cursor:pointer;transition:border-color .15s,color .15s}
  .tbtn:hover{color:var(--fg);border-color:var(--hair)}
  .nlink{font:500 10.5px 'Spline Sans Mono',monospace;letter-spacing:.14em;color:var(--muted)}
  .nlink:hover{color:var(--fg);opacity:1}
  .links[data-linklayout="vertical"]{flex-direction:column;align-items:flex-start;gap:11px}
  .links[data-linklayout="vertical"] .sep{display:none}
  .links[data-linkstyle="button"] .nlink{border:1px solid var(--hair);padding:9px 14px;transition:border-color .15s,color .15s}
  .links[data-linkstyle="button"] .nlink:hover{border-color:var(--fg);color:var(--fg);opacity:1}
  .links[data-linkstyle="button"] .sep{display:none}
  .zt{font:500 9px 'Spline Sans Mono',monospace;color:var(--muted);opacity:.55}
</style>
</head>
<body>

<div style="position:relative;height:100vh;min-height:740px;background:var(--bg);color:var(--fg);overflow:hidden;transition:background .2s,color .2s">

  <div style="position:absolute;inset:18px;border:1.25px solid var(--frame);pointer-events:none"></div>
  <div style="position:absolute;top:23px;left:44px;right:44px;display:flex;justify-content:space-between;pointer-events:none"><span class="zt">8</span><span class="zt">7</span><span class="zt">6</span><span class="zt">5</span><span class="zt">4</span><span class="zt">3</span><span class="zt">2</span><span class="zt">1</span></div>
  <div style="position:absolute;bottom:23px;left:44px;right:44px;display:flex;justify-content:space-between;pointer-events:none"><span class="zt">8</span><span class="zt">7</span><span class="zt">6</span><span class="zt">5</span><span class="zt">4</span><span class="zt">3</span><span class="zt">2</span><span class="zt">1</span></div>
  <div style="position:absolute;left:24px;top:60px;bottom:60px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none"><span class="zt">D</span><span class="zt">C</span><span class="zt">B</span><span class="zt">A</span></div>
  <div style="position:absolute;right:24px;top:60px;bottom:60px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none"><span class="zt">D</span><span class="zt">C</span><span class="zt">B</span><span class="zt">A</span></div>

  <!-- nav -->
  <nav style="position:absolute;top:46px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:center">
    <a href="index.html" style="display:block"><img src="assets/logo_horizontal_black.svg" alt="Hollow" style="height:51px;display:block;filter:invert(var(--invert))"></a>
    <div style="display:flex;align-items:center;gap:20px">
      <span style="font:500 11px 'Spline Sans Mono',monospace;letter-spacing:.16em;color:var(--muted)">AUSTRALIA</span>
      <button class="tbtn" onclick="toggleTheme()" aria-label="Toggle light and dark">THEME</button>
    </div>
  </nav>

  <!-- center: name + technical drawing -->
  <div style="position:absolute;top:120px;left:0;right:0;bottom:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px">
    <div style="text-align:center;display:flex;flex-direction:column;gap:13px">
      <span style="font:500 11px 'Spline Sans Mono',monospace;letter-spacing:.24em;color:var(--muted)">01 · CONNECTED SYSTEM</span>
      <h1 style="margin:0;font:300 46px/1 'Outfit',sans-serif;letter-spacing:-.01em;color:var(--fg)">Plate<span style="color:var(--muted)"> + </span>Connect</h1>
    </div>

    <div style="position:relative;width:520px;height:250px;color:var(--muted)">
      <svg viewBox="0 0 520 250" style="position:absolute;inset:0;width:100%;height:100%">
        <!-- plate outline -->
        <g stroke="currentColor" stroke-width="1.4" stroke-opacity=".85" fill="none">
          <rect x="34" y="52" width="322" height="132" rx="7"/>
          <rect x="48" y="66" width="294" height="104" rx="4" stroke-opacity=".4"/>
          <rect x="356" y="104" width="9" height="28" rx="2"/>
        </g>
        <!-- mounting holes + crosshair -->
        <g stroke="currentColor" stroke-width="1.1" stroke-opacity=".7" fill="none">
          <circle cx="58" cy="76" r="6.5"/><circle cx="332" cy="76" r="6.5"/><circle cx="58" cy="160" r="6.5"/><circle cx="332" cy="160" r="6.5"/>
          <line x1="58" y1="66" x2="58" y2="86"/><line x1="48" y1="76" x2="68" y2="76"/>
          <line x1="332" y1="66" x2="332" y2="86"/><line x1="322" y1="76" x2="342" y2="76"/>
          <line x1="58" y1="150" x2="58" y2="170"/><line x1="48" y1="160" x2="68" y2="160"/>
          <line x1="332" y1="150" x2="332" y2="170"/><line x1="322" y1="160" x2="342" y2="160"/>
        </g>
        <!-- phone (Connect) -->
        <g stroke="currentColor" stroke-width="1.4" stroke-opacity=".85" fill="none">
          <rect x="436" y="52" width="62" height="152" rx="15"/>
          <rect x="443" y="64" width="48" height="128" rx="9" stroke-opacity=".4"/>
        </g>
        <g stroke="currentColor" stroke-width="1.1" stroke-opacity=".5" fill="none">
          <rect x="452" y="98" width="30" height="17" rx="3"/>
          <line x1="452" y1="128" x2="482" y2="128"/>
          <line x1="452" y1="140" x2="474" y2="140"/>
        </g>
        <g fill="currentColor" fill-opacity=".55">
          <rect x="456" y="70" width="22" height="5.5" rx="2.75"/>
          <rect x="457" y="183" width="20" height="3" rx="1.5"/>
        </g>
        <!-- BLE link -->
        <g stroke="currentColor" stroke-width="1.2" stroke-opacity=".55" fill="none" stroke-dasharray="4 4">
          <path d="M365,118 C400,118 415,124 436,124"/>
        </g>
        <!-- width dimension -->
        <g stroke="currentColor" stroke-width="1" stroke-opacity=".45" fill="none">
          <line x1="34" y1="196" x2="34" y2="228"/>
          <line x1="356" y1="196" x2="356" y2="228"/>
          <line x1="34" y1="218" x2="356" y2="218"/>
        </g>
        <g fill="currentColor" fill-opacity=".55">
          <polygon points="44,214 34,218 44,222"/>
          <polygon points="346,214 356,218 346,222"/>
        </g>
      </svg>
      <span style="position:absolute;left:34px;width:322px;top:225px;text-align:center;font:500 8.5px/1.5 'Spline Sans Mono',monospace;color:var(--muted)">[XX.XX]<br>DIM. TBD</span>
      <span style="position:absolute;left:48px;width:294px;top:75px;text-align:center;font:500 8px 'Spline Sans Mono',monospace;letter-spacing:.42em;color:var(--muted)">AUSTRALIA</span>
      <span style="position:absolute;left:48px;width:294px;top:118px;transform:translateY(-50%);text-align:center;font:600 46px 'Spline Sans Mono',monospace;letter-spacing:.06em;color:var(--fg)">H0LL0W</span>
      <span style="position:absolute;left:34px;top:36px;font:500 8.5px 'Spline Sans Mono',monospace;letter-spacing:.18em;color:var(--muted)">PLATE</span>
      <span style="position:absolute;left:432px;top:36px;font:500 8.5px 'Spline Sans Mono',monospace;letter-spacing:.18em;color:var(--muted)">CONNECT</span>
      <span style="position:absolute;left:388px;top:96px;font:500 8px 'Spline Sans Mono',monospace;letter-spacing:.16em;color:var(--muted)">BLE</span>
    </div>
  </div>

  <!-- bottom-left nav -->
  <div class="links" data-linkstyle="button" data-linklayout="horizontal" style="position:absolute;left:64px;bottom:56px;display:flex;align-items:center;gap:16px">
    <a href="index.html" class="nlink">← INDEX</a>
    <span class="sep" style="color:var(--muted);opacity:.4">·</span>
    <a href="drive.html" class="nlink">DRIVE ↗</a>
  </div>

  <!-- title block -->
  <div style="position:absolute;right:64px;bottom:56px;width:312px;border:1px solid var(--frame)">
    <div style="padding:9px 13px;border-bottom:1px solid var(--frame);font:600 12px 'Outfit',sans-serif;letter-spacing:.02em;color:var(--fg)">HOLLOW PTY LTD</div>
    <div style="display:flex;border-bottom:1px solid var(--frame)">
      <span style="padding:7px 13px;border-right:1px solid var(--frame);font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.14em;color:var(--muted);width:52px">TITLE</span>
      <span style="padding:7px 13px;flex:1;font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.14em;color:var(--fg)">PLATE + CONNECT</span>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--frame)">
      <span style="padding:7px 13px;border-right:1px solid var(--frame);font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.1em;color:var(--muted);flex:1">SIZE&nbsp;&nbsp;D</span>
      <span style="padding:7px 13px;border-right:1px solid var(--frame);font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.1em;color:var(--muted);flex:1">SCALE&nbsp;&nbsp;1:2</span>
      <span style="padding:7px 13px;font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.1em;color:var(--muted);flex:1.2">SHEET 1 OF 1</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 13px">
      <span style="font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.08em;color:var(--muted)">DWG&nbsp;&nbsp;HC-001</span>
      <a href="mailto:hello@hollow.au" style="font:500 9px 'Spline Sans Mono',monospace;letter-spacing:.08em;color:var(--fg)">hello@hollow.au</a>
    </div>
  </div>

</div>

<script>
  function toggleTheme(){
    var light=document.body.classList.toggle('theme-light');
    try{localStorage.setItem('hollow-theme',light?'light':'dark')}catch(e){}
  }
  (function(){try{if(localStorage.getItem('hollow-theme')==='light')document.body.classList.add('theme-light')}catch(e){}})();
</script>
</body>
</html>
